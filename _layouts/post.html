---
layout: base
---
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BlogPosting",
  "headline": {{ page.title | jsonify }},
  "description": {{ page.description | default: page.excerpt | strip_html | strip_newlines | jsonify }},
  "datePublished": "{{ page.date | date_to_xmlschema }}",
  "url": "{{ page.url | absolute_url }}",
  "mainEntityOfPage": "{{ page.url | absolute_url }}",
  {%- if page.category %}"articleSection": {{ page.category | jsonify }},{% endif %}
  {%- if page.tags and page.tags.size > 0 %}"keywords": {{ page.tags | join: ", " | jsonify }},{% endif %}
  "author": { "@type": "Person", "name": "Chanyoung Park", "url": "{{ '/' | absolute_url }}" },
  "publisher": { "@type": "Person", "name": "Chanyoung Park", "url": "{{ '/' | absolute_url }}" }
}
</script>
<article class="post">
  <header class="post-header">
    <div class="post-meta">
      <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %-d, %Y" }}</time>
      {%- if page.category %} &middot; <a href="{{ '/' | relative_url }}">{{ page.category }}</a>{% endif -%}
    </div>
    <h1 class="post-title">{{ page.title }}</h1>
  </header>

  <div class="post-content">
    {{ content }}
  </div>

  {%- if page.tags and page.tags.size > 0 -%}
  <div class="post-tags">
    {% for tag in page.tags %}<span class="post-tag">#{{ tag }}</span>{% endfor %}
  </div>
  {%- endif -%}

  <nav class="post-nav">
    <a href="{{ '/' | relative_url }}">&larr; All posts</a>
  </nav>
</article>
